# Maven Proxy default user config
# Maven Proxy 用户模式默认配置
# This file is loaded by default in user mode.

# 中文: 代理服务端口，默认 8080。
# English: Proxy service port. Default: 8080.
PROXY_PORT=18080

# 中文: 本地仓库服务端口，默认 8081。
# English: Local repository service port. Default: 8081.
REPO_PORT=18081

# 中文: 缓存根目录，默认 data/cache。
# English: Cache root directory. Default: data/cache.
CACHE_DIR=data/cache

# 中文: 仅缓存指定后缀的文件（逗号分隔，点号可省略）。留空则使用内置默认值（Maven/npm/压缩/Web 常用后缀）。
# English: Only cache files with these extensions (comma-separated, leading dot optional). Leave empty to use built-in defaults (Maven/npm/archive/web common extensions).
# Default includes: .pom .jar .aar .war .ear .module .xml .sha1 .md5 .sha256 .sha512 .asc .toml .klib
#                   .tgz .tar.gz .tar.bz2 .tar.xz .json
#                   .zip .gz .gzip .bz2 .xz .7z .rar .zst
#                   .html .htm .js .mjs .cjs .css .ts .wasm
CACHE_ALLOWED_EXTENSIONS=

# 中文: 是否启用自动缓存清理，默认 true。
# English: Enable automatic cache cleanup. Default: true.
CACHE_CLEANUP_ENABLED=true

# 中文: 每日固定检查时间（本地时区，HH:mm），默认 03:00。
# English: Fixed daily check time in local timezone (HH:mm). Default: 03:00.
CACHE_CLEANUP_DAILY_AT=03:00

# 中文: 压力检测最小间隔（支持 s/m/h/d），默认 10m。
# English: Minimum interval for pressure checks (supports s/m/h/d). Default: 10m.
CACHE_CLEANUP_CHECK_MIN_INTERVAL=10m

# 中文: 缓存命中返回时是否更新文件 mtime，默认 true。
# English: Update file mtime when serving cache hit. Default: true.
CACHE_TOUCH_ON_HIT=true

# 中文: 同一文件两次 touch 最小间隔（支持 s/m/h/d），默认 1d。
# English: Minimum interval between touches for the same file (supports s/m/h/d). Default: 1d.
CACHE_TOUCH_MIN_INTERVAL=1d

# 中文: 清理轮次初始保留窗口（支持 s/m/h/d），默认 10d。
# English: Initial retention window for cleanup cycle (supports s/m/h/d). Default: 10d.
CACHE_RETENTION_START=10d

# 中文: 清理轮次最小保留窗口（支持 s/m/h/d），默认 1d。
# English: Minimum retention window for cleanup cycle (supports s/m/h/d). Default: 1d.
CACHE_RETENTION_MIN=1d

# 中文: 磁盘剩余空间低于该值触发清理（支持 K/M/G/T），默认 20G。
# English: Trigger cleanup when free disk space is below this value (supports K/M/G/T). Default: 20G.
CACHE_DISK_FREE_TRIGGER=20G

# 中文: 磁盘剩余空间恢复到该值可停止清理（支持 K/M/G/T），默认 25G。
# English: Stop cleanup when free disk space recovers to this value (supports K/M/G/T). Default: 25G.
CACHE_DISK_FREE_TARGET=25G

# 中文: 可选：缓存总大小触发阈值（支持 K/M/G/T），默认空（禁用）。
# English: Optional: cache total size trigger threshold (supports K/M/G/T). Default: empty (disabled).
CACHE_MAX_SIZE=

# 中文: 可选：缓存总大小回落目标（支持 K/M/G/T），默认空（禁用）。
# English: Optional: cache size recovery target (supports K/M/G/T). Default: empty (disabled).
CACHE_TARGET_SIZE=

# 中文: 缓存未命中时回源仓库列表（逗号分隔）。
# English: Fallback repository list when cache misses (comma-separated).
REPO_FALLBACK_REPOS=https://repo1.maven.org/maven2,https://jitpack.io,https://plugins.gradle.org/m2,https://dl.google.com

# 中文: 是否启用 HTTPS 代理处理（true/false），默认 true。
# English: Enable HTTPS proxy handling (true/false). Default: true.
ENABLE_HTTPS_PROXY=true

# 中文: 执行 MITM 证书签发的域名列表（逗号分隔，支持通配符）。
# English: Domains for MITM certificate issuance (comma-separated, wildcard supported).
HTTPS_MITM_DOMAINS=repo1.maven.org,repo.maven.apache.org,registry.npmjs.org,dl.google.com

# 中文: 未命中 MITM 域名时是否允许隧道透传，默认 false。
# English: Allow tunnel passthrough for unmatched MITM domains. Default: false.
HTTPS_PASSTHROUGH_FOR_UNMATCHED=false

# 中文: 识别为 npm 生态并分流缓存的域名列表（支持通配符）。
# English: Domains recognized as npm ecosystem for cache routing (wildcard supported).
NPM_REGISTRY_DOMAINS=registry.npmjs.org,registry.npmmirror.com,npm.pkg.github.com

# 中文: 识别为 Maven 生态并分流缓存的域名列表（支持通配符）。
# English: Domains recognized as Maven ecosystem for cache routing (wildcard supported).
MAVEN_REPO_DOMAINS=repo1.maven.org,repo.maven.apache.org,jitpack.io,plugins.gradle.org,dl.google.com

# 中文: Maven 缓存是否按域名作为一级目录，默认 false。
# English: Whether Maven cache uses hostname as the first-level directory. Default: false.
MAVEN_CACHE_USE_DOMAIN_DIR=false

# 中文: Maven 缓存应忽略的路径前缀规则（逗号分隔，支持 host/path 与 host:port/path）。
# English: Maven cache path-prefix ignore rules (comma-separated, supports host/path and host:port/path).
MAVEN_CACHE_IGNORE_PATH_PREFIXES=repo1.maven.org/maven2,repo.maven.apache.org/maven2,jitpack.io/,plugins.gradle.org/m2,dl.google.com/dl/android/maven2,dl.google.com/dl/google/maven

# 中文: 启用多线程下载的域名列表（支持通配符）。
# English: Domains that enable multi-thread download (wildcard supported).
MULTI_THREAD_DOMAINS=repo1.maven.org

# 中文: 多线程下载线程数，默认 8。
# English: Thread count for multi-thread download. Default: 8.
MULTI_THREAD_COUNT=8

# 中文: 触发多线程下载的最小文件大小阈值（MB），默认 1。
# English: Minimum file size threshold in MB to trigger multi-thread download. Default: 1.
MULTI_THREAD_MIN_SIZE_MB=1M

# 中文: 上游请求超时时间（支持 s/m/h/d），默认 60s。
# English: Upstream request timeout (supports s/m/h/d). Default: 60s.
DOWNLOAD_TIMEOUT=60s

# 中文: 统一主日志与错误日志目录。
# English: Unified main and error log directory.
DOWNLOAD_LOG_DIR=data/logs/downloads

# 中文: 日志保留时长（支持 s/m/h/d），默认 7d。
# English: Log retention duration (supports s/m/h/d). Default: 7d.
LOG_RETENTION=7d

# 中文: 是否输出运行期日志到命令行，默认 false。
# English: Output runtime logs to stdout. Default: false.
LOG_TO_STDOUT=false

# 中文: 是否输出详细 CONNECT/MITM 握手日志，默认 false。
# English: Output detailed CONNECT/MITM handshake logs. Default: false.
LOG_CONNECT_EVENTS=false

# 中文: 是否启用出站 keep-alive 连接复用池，默认 true。
# English: Enable outbound keep-alive connection pool. Default: true.
OUTBOUND_KEEP_ALIVE=true

# 中文: keep-alive 间隔（支持 s/m/h/d），默认 1s。
# English: Keep-alive interval (supports s/m/h/d). Default: 1s.
OUTBOUND_KEEP_ALIVE_INTERVAL=1s

# 中文: 每个源站最大出站连接数，默认 64。
# English: Maximum outbound sockets per upstream host. Default: 64.
OUTBOUND_MAX_SOCKETS=64

# 中文: 每个源站可保留空闲连接上限，默认 16。
# English: Maximum free outbound sockets kept per upstream host. Default: 16.
OUTBOUND_MAX_FREE_SOCKETS=16

# 中文: 是否启用 Maven negative 索引，默认 true。
# English: Enable Maven negative index. Default: true.
MAVEN_NEGATIVE_ENABLED=true

# 中文: Maven negative 索引目录，默认 data/index。
# English: Maven negative index directory. Default: data/index.
MAVEN_NEGATIVE_INDEX_DIR=data/index

# 中文: 负缓存 TTL（支持 s/m/h/d），默认 24h。
# English: Negative cache TTL (supports s/m/h/d). Default: 24h.
MAVEN_NEGATIVE_CACHE_TTL=24h

# 中文: negative 事件日志 flush 周期（支持 s/m/h/d），默认 5s。
# English: Negative event log flush interval (supports s/m/h/d). Default: 5s.
MAVEN_NEGATIVE_FLUSH_INTERVAL=5s

# 中文: negative 事件日志压缩阈值（MB），默认 8。
# English: Negative event log compaction threshold in MB. Default: 8.
MAVEN_NEGATIVE_EVENT_MAX_MB=8M

# 中文: 通用上级代理地址（HTTP/HTTPS 兜底）。
# English: Generic upstream proxy URL fallback for HTTP/HTTPS.
UPSTREAM_PROXY_URL=http://127.0.0.1:7890

# 中文: HTTP 请求使用的上级代理地址。
# English: Upstream proxy URL for HTTP requests.
UPSTREAM_HTTP_PROXY_URL=

# 中文: HTTPS 请求使用的上级代理地址。
# English: Upstream proxy URL for HTTPS requests.
UPSTREAM_HTTPS_PROXY_URL=

# 中文: 不走上级代理的域名列表（逗号分隔，支持通配符，* 表示全部直连）。
# English: Domains that bypass upstream proxy (comma-separated, wildcard supported, * means direct for all).
UPSTREAM_NO_PROXY=127.0.0.1,localhost

# 中文: 额外忽略上级代理的域名列表（支持通配符）。
# English: Additional domains ignored by upstream proxy (wildcard supported).
UPSTREAM_IGNORE_DOMAINS=

# 中文: 证书根目录，默认 data/certs。
# English: Certificate root directory. Default: data/certs.
CERT_DIR=data/certs

# 中文: Root CA 证书路径。
# English: Root CA certificate path.
ROOT_CERT_PATH=data/certs/root-ca.crt

# 中文: Root CA 私钥路径。
# English: Root CA private key path.
ROOT_KEY_PATH=data/certs/root-ca.key.pem

# 中文: 站点叶子证书目录。
# English: Leaf certificate directory.
LEAF_CERT_DIR=data/certs/leaf

# 中文: Java trust store 文件路径。
# English: Java trust store file path.
TRUST_STORE_PATH=data/certs/proxy-truststore.jks

# 中文: 导入 Root CA 到 trust store 时使用的别名。
# English: Alias used to import Root CA into trust store.
TRUST_STORE_ALIAS=maven-proxy-root-ca

# 中文: trust store 密码。
# English: Trust store password.
TRUST_STORE_PASSWORD=changeit

# 中文: 已有 truststore 路径（可选），初始化时可作为源。
# English: Existing truststore path (optional), used as source during init.
EXISTING_TRUST_STORE_PATH=

# 中文: 已有 truststore 密码（可选），用于读取 EXISTING_TRUST_STORE_PATH。
# English: Existing truststore password (optional), used to read EXISTING_TRUST_STORE_PATH.
EXISTING_TRUST_STORE_PASSWORD=

# 中文: Java 安装路径；为空或无效时会自动探测。
# English: Java installation path; auto-detected when empty or invalid.
JAVA_HOME=
